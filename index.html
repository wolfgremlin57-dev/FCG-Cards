<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FCG Cardpool</title>
        <link rel="stylesheet" href="styles.css">

    </head>
    <body>
         <h1>FCG CARD DATABASE</h1>
        <div class="controls">
            <input type="text" id="search" placeholder="Search name ...">
            <select id="Set">
                <option value="">Set</option>
                <option value="FCG1-Cawthon Chaos">FCG1-Cawthon Chaos</option>
                <option value="FCG2-Viral Infection">FCG2-Viral Infection</option>
                <option value="FCG3-Twisted Tales">FCG3-Twisted Tales</option>
                <option value="FCG4-Enter the Fazverse">FCG4-Enter the Fazverse</option>
                <option value="FCG5-All That's Remembered">FCG5-All That's Remembered</option>
            </select>
            <select id="Rarity">
                <option value="">Rarity</option>
                <option value="☆☆☆☆">☆☆☆☆ (Secret Rare)</option>
                <option value="☆☆☆">☆☆☆ (Rare)</option>
                <option value="☆☆">☆☆ (Uncommon)</option>
                <option value="☆">☆ (Common)</option>
                <option value="★">★ (Token)</option>
            </select>
            <select id="Power">
                <option value="">Power</option>
                <option value="H100">100</option>
                <option value="90">90</option>
                <option value="80">80</option>
                <option value="70">70</option>
                <option value="60">60</option>
                <option value="50">50</option>
                <option value="40">40</option>
                <option value="30">30</option>
                <option value="20">20</option>
                <option value="10">10</option>
                <option value="0">0</option>
                <option value="-10">-10</option>
                <option value="_Null">Null</option>
            </select>
            <select id="Jp">
                <option value="">JP</option>
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="X">X</option>
            </select>
            <input type="text" id="effect" placeholder="Search effect ...">
            <select id="Map">
                <option value="">Map</option>
                <option value="Opponent">Opponents Side</option>
                <option value="Omni">Omni</option>
                <option value="Uber">Uber</option>

                <option value="Right_Office">Right Office</option>
                <option value="Left_Office">Left Office</option>
                <option value="Off Map">Off map</option>
            </select>
            <select id="Map_Options">
                <option value="Inclusive">Map: Inclusive</option>
                <option value="Exact">Map: Exactly</option>
                <option value="Exclusive">Map: Exclusive</option>
            </select>
            <select id="Design">
                <option value="">Design</option>
                <option value="Adult">Adult</option>

                <option value="Lemur">Lemur</option>

                <option value="Inclusive">Design: Inclusive</option>
                <option value="Exact">Design: Exactly</option>

            </select>

                <option value="ID">Set/Id</option>
                <option value="Alphabetically">A -> Z</option>
                <option value="Alphabetically Reversed">Z -> A</option>
                <option value="Rarity">Rarity: Token -> Secret Rare</option>
                <option value="Rarity Reversed">Rarity: Secret Rare -> Token</option>
                <option value="Power">Power: Low -> High</option>
                <option value="Power Reversed">Power: High -> Low</option>
                <option value="JP">JP: Low -> High</option>
                <option value="JP Reversed">JP: High -> Low</option>
            </select>
<button id="clearFilters">Clear</button>

        <div class="grid" id="results"></div>
       <div class="pagination">
    <span id="pageInfo"></span>
        </div>
<div id="pagination"></div>
        <script src="cards.js"></script>
<script src="script.js"></script>

</html>
